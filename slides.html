<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            background-color: #f4f4f4;\n        }\n        .carousel {\n            position: relative;\n            max-width: 100%;\n            margin: auto;\n            overflow: hidden;\n        }\n        .slides {\n            display: flex;\n            transition: transform 0.5s ease;\n        }\n        .slide {\n            min-width: 100%;\n            box-sizing: border-box;\n            position: relative;\n        }\n        .slide img {\n            width: 100%;\n            height: auto;\n        }\n        .prev, .next {\n            cursor: pointer;\n            position: absolute;\n            top: 50%;\n            width: auto;\n            padding: 16px;\n            color: white;\n            background-color: rgba(0, 0, 0, 0.5);\n            border: none;\n            border-radius: 5px;\n            transform: translateY(-50%);\n        }\n        .prev {\n            left: 10px;\n        }\n        .next {\n            right: 10px;\n        }\n    </style>\n    <title>ProfitPulse Carousel</title>\n</head>\n<body>\n    <div class="carousel">\n        <div class="slides">\n            <div class="slide"><img src="image1.jpg" alt="Slide 1"></div>\n            <div class="slide"><img src="image2.jpg" alt="Slide 2"></div>\n            <div class="slide"><img src="image3.jpg" alt="Slide 3"></div>\n        </div>\n        <button class="prev" onclick="changeSlide(-1)">&#10094;</button>\n        <button class="next" onclick="changeSlide(1)">&#10095;</button>\n    </div>\n    <script>\n        let currentIndex = 0;\n        const slides = document.querySelectorAll('.slide');\n        function changeSlide(direction) {\n            currentIndex += direction;\n            if (currentIndex < 0) {\n                currentIndex = slides.length - 1;\n            } else if (currentIndex >= slides.length) {\n                currentIndex = 0;\n            }\n            const slideWidth = slides[0].clientWidth;\n            document.querySelector('.slides').style.transform = 'translateX(' + (-slideWidth * currentIndex) + 'px)';\n        }\n    </script>\n</body>\n</html>
