<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfitPulse | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; margin: 0; }
        .overlay { display: flex; flex-direction: column; align-items: center; padding: 50px 20px; min-height: 100vh; }
        .dashboard-card { 
            background: rgba(20, 20, 20, 0.95); 
            padding: 30px; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 650px; 
            border: 1px solid rgba(0, 255, 204, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        select, textarea { 
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; 
            background: #1a1a1a; color: white; border: 1px solid #333; font-size: 1rem;
        }
        textarea { height: 120px; resize: none; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-ai { background: #007bff; color: white; }
        .btn-pub { background: #28a745; color: white; }
        .btn-pdf { background: #ffc107; color: black; }
        .btn-logout { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; margin-top: 20px; }
        #pitch-wall { max-height: 400px; overflow-y: auto; }
        .trademark { margin-top: 40px; color: #555; font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="overlay">
        <h1 style="color: #00ffcc; margin-bottom: 30px;">PROFITPULSE PORTAL</h1>

        <div id="entrepreneur-view" class="dashboard-card" style="display:none;">
            <h2 style="margin-top:0;">Founder's Hub</h2>
            <p style="color:#aaa;">Select market and define your strategy:</p>
            
            <select id="city-dropdown">
                <option value="">Loading Cities...</option>
            </select>
            
            <textarea id="idea-text" placeholder="Explain your business model... (e.g. AI-driven logistics in Karachi)"></textarea>
            
            <div class="btn-row">
                <button class="btn-ai" onclick="generate()">AI Roadmap</button>
                <button class="btn-pub" onclick="publishPitch()">Publish Pitch</button>
                <button class="btn-pdf" onclick="generatePDF()">Export PDF</button>
            </div>
            
            <div id="result"></div>
        </div>

        <div id="investor-view" class="dashboard-card" style="display:none;">
            <h2 style="margin-top:0; color:#2ecc71;">Investment Opportunities</h2>
            <div id="pitch-wall"></div>
        </div>

        <button class="btn-logout" onclick="logoutUser()">Logout</button>
        
        <p class="trademark">CREATED BY FLANKER DELTA</p>
    </div>

    <script src="cities.js"></script>
    <script src="ai.js"></script>
    <script src="pdf.js"></script>
    <script src="script.js"></script>
</body>
</html>
